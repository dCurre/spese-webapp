<div class="signup-page" [class.leaving-right]="leaving">

    <div class="signup-left">
        <div class="signup-brand">
            <i class="fa fa-money-bill-wave signup-brand-icon"></i>
            <span class="signup-brand-name">Spese</span>
        </div>
        <h1 class="signup-tagline">Unisciti a Spese.</h1>
        <p class="signup-sub">Crea il tuo account e inizia a tracciare le spese condivise.</p>
    </div>

    <div class="signup-right">
        <div class="signup-card">
            <h2 class="signup-title">Crea account</h2>
            <p class="signup-desc">Registrazione in arrivo.</p>
            <a (click)="goToSignin()" class="signup-back" style="cursor:pointer">
                <i class="fa fa-arrow-left"></i> Torna al login
            </a>
        </div>
    </div>

</div>
