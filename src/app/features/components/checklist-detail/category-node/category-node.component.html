<div class="category-block" [class.category-all-checked]="checkedAll" [style.margin-left.px]="depth > 0 ? indentPx : 0">

    <!-- HEADER -->
    <div class="category-header">
        <button class="category-check-btn"
                [class.checked]="checkedAll"
                [class.indeterminate]="indeterminate"
                [disabled]="!(cat.items?.length) && !(cat.children?.length)"
                (click)="categoryToggle.emit({ cat: cat })"
                [title]="checkedAll ? 'Deseleziona tutto' : 'Seleziona tutto'">
            <i class="fa" [ngClass]="{
                'fa-circle-check': checkedAll,
                'fa-circle-minus': indeterminate,
                'fa-circle': !checkedAll && !indeterminate
            }"></i>
        </button>

        <!-- Nome categoria -->
        <div class="category-name-area" (click)="collapsed = !collapsed">
            <ng-container *ngIf="editingCategoryId !== cat.id">
                <span class="category-name" [class.category-name-done]="checkedAll">{{cat.name}}</span>
                <span class="category-count">{{checkedItemCount}}/{{(cat.items || []).length}}</span>
            </ng-container>
            <div class="item-edit-form" *ngIf="editingCategoryId === cat.id" (click)="$event.stopPropagation()">
                <input class="edit-input" type="text" [ngModel]="editingCategoryName"
                       (ngModelChange)="categoryRenameNameChange.emit($event)"
                       (keydown)="onEditCategoryKeydown($event, cat)" autofocus
                       [disabled]="savingEditCategoryId === cat.id">
                <button class="btn-edit-save" (click)="categoryRenameSave.emit({ cat: cat, name: editingCategoryName })"
                        [disabled]="!editingCategoryName.trim() || savingEditCategoryId === cat.id">
                    <i class="fa" [ngClass]="savingEditCategoryId === cat.id ? 'fa-spinner fa-spin' : 'fa-check'"></i>
                </button>
                <button class="btn-edit-cancel" (click)="categoryRenameCancel.emit()" [disabled]="savingEditCategoryId === cat.id">
                    <i class="fa fa-times"></i>
                </button>
            </div>
        </div>

        <!-- Azioni -->
        <div class="category-actions" *ngIf="editingCategoryId !== cat.id">
            <div class="category-mini-bar-wrap">
                <div class="category-mini-bar">
                    <div class="category-mini-fill" [style.width.%]="progress" [class.complete]="checkedAll"></div>
                </div>
            </div>
            <button class="item-edit-btn" (click)="categoryRenameStart.emit(cat); $event.stopPropagation()" title="Rinomina"
                    [disabled]="deletingId === cat.id">
                <i class="fa fa-pencil"></i>
            </button>
            <button class="item-delete-btn" (click)="categoryDelete.emit({ cat: cat }); $event.stopPropagation()" title="Elimina"
                    [disabled]="deletingId === cat.id">
                <i class="fa" [ngClass]="deletingId === cat.id ? 'fa-spinner fa-spin' : 'fa-trash'"></i>
            </button>
            <button class="category-collapse-btn" [class.collapsed]="collapsed" (click)="collapsed = !collapsed">
                <i class="fa fa-chevron-down"></i>
            </button>
        </div>
    </div>

    <!-- BODY -->
    <div class="category-body" [class.collapsed]="collapsed">
        <div class="category-items-list">

            <!-- Sottocategorie ricorsive -->
            <app-category-node *ngFor="let child of (cat.children || [])"
                [cat]="child" [depth]="depth + 1"
                [editingItemId]="editingItemId" [editingItemName]="editingItemName" [editingItemQty]="editingItemQty"
                [savingEditId]="savingEditId" [deletingId]="deletingId"
                [editingCategoryId]="editingCategoryId" [editingCategoryName]="editingCategoryName"
                [savingEditCategoryId]="savingEditCategoryId"
                [addingItemInCategoryId]="addingItemInCategoryId"
                [newCategoryItemName]="newCategoryItemName" [newCategoryItemQty]="newCategoryItemQty"
                [savingItem]="savingItem"
                [addingSubcategoryParentId]="addingSubcategoryParentId"
                [newSubcategoryName]="newSubcategoryName" [savingCategory]="savingCategory"
                (itemToggle)="itemToggle.emit($event)"
                (itemSave)="itemSave.emit($event)"
                (itemDelete)="itemDelete.emit($event)"
                (itemEditStart)="itemEditStart.emit($event)"
                (itemEditCancel)="itemEditCancel.emit()"
                (itemEditNameChange)="itemEditNameChange.emit($event)"
                (itemEditQtyChange)="itemEditQtyChange.emit($event)"
                (categoryToggle)="categoryToggle.emit($event)"
                (categoryDelete)="categoryDelete.emit($event)"
                (categoryRenameStart)="categoryRenameStart.emit($event)"
                (categoryRenameSave)="categoryRenameSave.emit($event)"
                (categoryRenameCancel)="categoryRenameCancel.emit()"
                (categoryRenameNameChange)="categoryRenameNameChange.emit($event)"
                (addItemStart)="addItemStart.emit($event)"
                (addItemCancel)="addItemCancel.emit()"
                (addItemSave)="addItemSave.emit($event)"
                (addItemNameChange)="addItemNameChange.emit($event)"
                (addItemQtyChange)="addItemQtyChange.emit($event)"
                (addSubcategoryStart)="addSubcategoryStart.emit($event)"
                (addSubcategoryCancel)="addSubcategoryCancel.emit()"
                (addSubcategorySave)="addSubcategorySave.emit($event)"
                (addSubcategoryNameChange)="addSubcategoryNameChange.emit($event)">
            </app-category-node>

            <!-- Item non spuntati -->
            <div class="cat-item-row" *ngFor="let item of uncheckedItems">
                <button class="item-check-btn unchecked" (click)="itemToggle.emit({ item: item })">
                    <i class="fa fa-circle"></i>
                </button>
                <div class="item-content" *ngIf="editingItemId !== item.id">
                    <span class="item-name">{{item.name}}</span>
                    <span class="item-qty" *ngIf="item.quantity">{{item.quantity}}</span>
                </div>
                <ng-container *ngIf="editingItemId === item.id">
                    <input class="batch-input batch-input-name" type="text" [ngModel]="editingItemName"
                           (ngModelChange)="itemEditNameChange.emit($event)"
                           (keydown)="onEditItemKeydown($event, item)" autofocus
                           [disabled]="savingEditId === item.id">
                    <div class="qty-stepper" [class.qty-stepper-disabled]="savingEditId === item.id">
                        <button class="qty-btn" (click)="itemEditQtyChange.emit(editingItemQty && editingItemQty > 1 ? editingItemQty - 1 : null)"
                                [disabled]="savingEditId === item.id || !editingItemQty">−</button>
                        <span class="qty-value">{{editingItemQty || '—'}}</span>
                        <button class="qty-btn" (click)="itemEditQtyChange.emit((editingItemQty || 0) + 1)"
                                [disabled]="savingEditId === item.id">+</button>
                    </div>
                    <button class="btn-edit-save" (click)="itemSave.emit({ item: item, name: editingItemName, quantity: editingItemQty })"
                            [disabled]="!editingItemName.trim() || savingEditId === item.id">
                        <i class="fa" [ngClass]="savingEditId === item.id ? 'fa-spinner fa-spin' : 'fa-check'"></i>
                    </button>
                    <button class="btn-edit-cancel" (click)="itemEditCancel.emit()" [disabled]="savingEditId === item.id">
                        <i class="fa fa-times"></i>
                    </button>
                </ng-container>
                <ng-container *ngIf="editingItemId !== item.id">
                    <button class="item-edit-btn" (click)="itemEditStart.emit(item)" [disabled]="deletingId === item.id">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button class="item-delete-btn" (click)="itemDelete.emit({ item: item })" [disabled]="deletingId === item.id">
                        <i class="fa" [ngClass]="deletingId === item.id ? 'fa-spinner fa-spin' : 'fa-trash'"></i>
                    </button>
                </ng-container>
            </div>

            <!-- Item spuntati -->
            <div class="cat-item-row cat-item-checked" *ngFor="let item of checkedItems">
                <button class="item-check-btn checked" (click)="itemToggle.emit({ item: item })">
                    <i class="fa fa-circle-check"></i>
                </button>
                <div class="item-content">
                    <span class="item-name item-name-checked">{{item.name}}</span>
                    <span class="item-qty" *ngIf="item.quantity">{{item.quantity}}</span>
                </div>
                <button class="item-delete-btn" (click)="itemDelete.emit({ item: item })" [disabled]="deletingId === item.id">
                    <i class="fa" [ngClass]="deletingId === item.id ? 'fa-spinner fa-spin' : 'fa-trash'"></i>
                </button>
            </div>

            <!-- Form aggiungi item -->
            <div class="cat-item-row cat-item-add-inline" *ngIf="addingItemInCategoryId === cat.id">
                <span class="item-add-icon"><i class="fa fa-plus"></i></span>
                <input class="batch-input batch-input-name" type="text" [ngModel]="newCategoryItemName"
                       (ngModelChange)="addItemNameChange.emit($event)"
                       (keydown)="onAddItemKeydown($event, cat)" autofocus [disabled]="savingItem">
                <div class="qty-stepper" [class.qty-stepper-disabled]="savingItem">
                    <button class="qty-btn" (click)="addItemQtyChange.emit(newCategoryItemQty > 1 ? newCategoryItemQty - 1 : 1)"
                            [disabled]="savingItem || newCategoryItemQty <= 1">−</button>
                    <span class="qty-value">{{newCategoryItemQty}}</span>
                    <button class="qty-btn" (click)="addItemQtyChange.emit(newCategoryItemQty + 1)" [disabled]="savingItem">+</button>
                </div>
                <button class="btn-edit-save" (click)="addItemSave.emit({ cat: cat, name: newCategoryItemName, quantity: newCategoryItemQty })"
                        [disabled]="!newCategoryItemName.trim() || savingItem">
                    <i class="fa" [ngClass]="savingItem ? 'fa-spinner fa-spin' : 'fa-check'"></i>
                </button>
                <button class="btn-edit-cancel" (click)="addItemCancel.emit()" [disabled]="savingItem">
                    <i class="fa fa-times"></i>
                </button>
            </div>

            <!-- Bottoni azione in fondo -->
            <div class="cat-footer-actions" *ngIf="addingItemInCategoryId !== cat.id && addingSubcategoryParentId !== cat.id">
                <button class="cat-item-row btn-add-inline" (click)="addItemStart.emit(cat.id)">
                    <span class="item-add-icon"><i class="fa fa-plus"></i></span>
                    <span class="btn-add-inline-label">Aggiungi articolo</span>
                </button>
                <button class="cat-item-row btn-add-inline btn-add-subcategory" (click)="addSubcategoryStart.emit(cat.id)">
                    <span class="item-add-icon"><i class="fa fa-folder-plus"></i></span>
                    <span class="btn-add-inline-label">Aggiungi sottocategoria</span>
                </button>
            </div>

            <!-- Form aggiungi sottocategoria -->
            <div class="cat-item-row cat-item-add-inline cat-item-add-subcategory" *ngIf="addingSubcategoryParentId === cat.id">
                <span class="item-add-icon"><i class="fa fa-folder-plus"></i></span>
                <input class="batch-input batch-input-name" type="text" [ngModel]="newSubcategoryName"
                       (ngModelChange)="addSubcategoryNameChange.emit($event)"
                       (keydown)="onAddSubcategoryKeydown($event, cat)" autofocus [disabled]="savingCategory">
                <button class="btn-edit-save" (click)="addSubcategorySave.emit({ parent: cat, name: newSubcategoryName })"
                        [disabled]="!newSubcategoryName.trim() || savingCategory">
                    <i class="fa" [ngClass]="savingCategory ? 'fa-spinner fa-spin' : 'fa-check'"></i>
                </button>
                <button class="btn-edit-cancel" (click)="addSubcategoryCancel.emit()" [disabled]="savingCategory">
                    <i class="fa fa-times"></i>
                </button>
            </div>

        </div>
    </div>
</div>
