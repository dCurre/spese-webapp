<!-- Sidebar desktop -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <i class="fa fa-money-bill-wave sidebar-logo-icon"></i>
        <span class="sidebar-logo-text">{{ appName }}</span>
        <a class="sidebar-about-icon" routerLink="/about" routerLinkActive="active" title="About">
            <i class="fa fa-circle-info"></i>
        </a>
    </div>

    <nav class="sidebar-nav">
        <a class="sidebar-item" routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="fa fa-receipt"></i>
            <span>Liste Spese</span>
        </a>
        <a class="sidebar-item" routerLink="/checklist" routerLinkActive="active">
            <i class="fa fa-list-check"></i>
            <span>Checklist spesa</span>
        </a>
        <ng-container *ngIf="authService.getStoredUser() | async as user">
            <a class="sidebar-item sidebar-item-admin" routerLink="/admin" routerLinkActive="active" *ngIf="user.role === 'admin' || user.role === 'superadmin'">
                <i class="fa fa-shield-halved"></i>
                <span>Admin</span>
            </a>
        </ng-container>
    </nav>

    <div class="sidebar-footer" *ngIf="authService.getStoredUser() | async as user">
        <a routerLink="/profile" routerLinkActive="active" class="sidebar-user-link">
            <app-user-avatar [user]="user" [size]="36" shape="circle"></app-user-avatar>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name">{{user.name}} {{user.surname}}</div>
                <div class="sidebar-user-role">{{user.role}}</div>
            </div>
        </a>
        <button class="sidebar-logout-btn" (click)="logout()" title="Esci">
            <i class="fa fa-sign-out"></i>
        </button>
    </div>
</aside>

<!-- Bottom nav mobile -->
<nav class="bottom-nav">
    <a class="bottom-nav-item" routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <i class="fa fa-receipt"></i>
        <span>Liste Spese</span>
    </a>
    <a class="bottom-nav-item" routerLink="/checklist" routerLinkActive="active">
        <i class="fa fa-list-check"></i>
        <span>Checklist</span>
    </a>
    <a class="bottom-nav-item" routerLink="/profile" routerLinkActive="active">
        <i class="fa fa-user"></i>
        <span>Profilo</span>
    </a>
    <ng-container *ngIf="authService.getStoredUser() | async as user">
        <a class="bottom-nav-item" routerLink="/admin" routerLinkActive="active" *ngIf="user.role === 'admin' || user.role === 'superadmin'">
            <i class="fa fa-shield-halved"></i>
            <span>Admin</span>
        </a>
    </ng-container>
    <a class="bottom-nav-item" routerLink="/about" routerLinkActive="active">
        <i class="fa fa-circle-info"></i>
        <span>About</span>
    </a>
</nav>
