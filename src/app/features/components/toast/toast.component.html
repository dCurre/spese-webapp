<ngb-toast
  *ngFor="let toast of toastService.toasts; trackBy: trackToast"
  [autohide]="true"
  [delay]="5000"
  (hidden)="toastService.remove(toast)"
  (click)="toastService.remove(toast)"
  [class]="toast.type === 'error' ? 'bg-danger text-white' : 'bg-success text-white'"
  style="cursor: pointer">
  {{ toast.message }}
</ngb-toast>
