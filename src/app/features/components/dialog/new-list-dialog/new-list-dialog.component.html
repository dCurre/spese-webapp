<div class="dialog-header">
    <h5 class="dialog-title">Nuova lista</h5>
    <button class="dialog-close" (click)="modalService.close(null)" aria-label="Close">
        <i class="fa fa-times"></i>
    </button>
</div>

<div class="dialog-body">
    <form #newListForm="ngForm">

        <div class="field-group">
            <label class="field-label">Tipo</label>
            <div class="type-selector">
                <button type="button" class="type-btn" [class.active]="selectedType === 'shared'" (click)="selectedType = 'shared'">
                    <i class="fa fa-users"></i>
                    <span class="type-btn-label">Condivisa</span>
                    <span class="type-btn-desc">Con partecipanti e saldi</span>
                </button>
                <button type="button" class="type-btn" [class.active]="selectedType === 'personal'" (click)="selectedType = 'personal'">
                    <i class="fa fa-user"></i>
                    <span class="type-btn-label">Personale</span>
                    <span class="type-btn-desc">Solo per te</span>
                </button>
            </div>
        </div>

        <div class="field-group">
            <label class="field-label">Nome della lista</label>
            <input type="text" name="listName" [(ngModel)]="expensesList.name" class="field-input"
                [class.is-invalid]="expensesList.name !== undefined && !isValidListName(expensesList.name!)"
                [class.is-valid]="expensesList.name !== undefined && isValidListName(expensesList.name!)"
                placeholder="Es. Vacanza Mare 2025">
            <span class="field-error" *ngIf="expensesList.name !== undefined && !isValidListName(expensesList.name!)">
                Deve contenere 1-{{maxInputText}} caratteri.
            </span>
        </div>

    </form>
</div>

<div class="dialog-footer">
    <button class="btn-cancel" (click)="modalService.close(null)">Annulla</button>
    <button class="btn-confirm" [disabled]="!isValidListName(expensesList.name!)"
        (click)="modalService.close({ name: expensesList.name, list_type: selectedType })">Crea</button>
</div>
