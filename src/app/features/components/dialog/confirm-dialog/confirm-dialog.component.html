<div class="confirm-dialog">
    <div class="confirm-dialog-header">
        <div class="confirm-dialog-icon">
            <i class="fa fa-triangle-exclamation"></i>
        </div>
        <button class="confirm-dialog-close" (click)="modalService.close(false)">
            <i class="fa fa-times"></i>
        </button>
    </div>
    <div class="confirm-dialog-body">
        <h5 class="confirm-dialog-title">{{dialogFields.title}}</h5>
        <p class="confirm-dialog-text">{{dialogFields.body}}</p>
    </div>
    <div class="confirm-dialog-footer">
        <button class="confirm-btn confirm-btn-cancel" (click)="modalService.close(false)">
            Annulla
        </button>
        <button class="confirm-btn confirm-btn-confirm" (click)="modalService.close(true)">
            Conferma
        </button>
    </div>
</div>
