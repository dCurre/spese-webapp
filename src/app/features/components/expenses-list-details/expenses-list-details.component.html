<div *ngIf="!expensesList">
    <app-spinner></app-spinner>
</div>
<div *ngIf="expensesList">
    <br>
    <h1 class="d-flex justify-content-center">
        {{expensesList.name}}
    </h1>
    <div class="container col-lg-6 mb-5">

        <div id="saldo" class="d-inline-flex">
            Saldo:
            <span id="saldo-pallino" class="avatar"
                [ngClass]="expensesList.paid ? 'gd-saldato' : ' gd-non-saldato'">
            </span>
        </div>
        <div class="d-flex">
            <div class="input-group">
                <input
                  type="text"
                  class="form-control"
                  placeholder="Cerca..."
                  [(ngModel)]="searchTerm"
                />
                <span class="input-group-text"><i class="fas fa-search"></i></span>
            </div>
            <div>
                <button id="btn-add" (click)="openNewExpenseDialog(newExpense(), 'Crea')" class="btn ml-1"
                    [ngClass]="expensesList.paid ? 'btn-secondary' : 'btn-success'" [disabled]="expensesList.paid"
                    type="button">
                    <i class="fa fa-plus"></i> Nuova spesa</button>
            </div>
            <div class="btn-group dropdown">
                <a href="#" data-toggle="dropdown" class="text-muted" data-abc="true">
                    <span class="input-group-text btn btn-outline-secondary"><i class="fas fa-cog"></i></span>
                </a>
                <div class="dropdown-menu dropdown-menu-right" role="menu">
                    <button class="dropdown-item" [routerLink]="['/details', expensesList.id]">Dettagli</button>
                    <button class="dropdown-item" (click)="shareLink()">Condividi</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" (click)="salda(expensesList)">{{expensesList.paid ? 'Riapri Saldo' : 'Chiudi Saldo'}}</button>
                    <button class="dropdown-item" (click)="leave(expensesList)">Abbandona</button>
                </div>
            </div>
        </div>

        <div class="lists-container">
            <div *ngIf="expensesLoaded && expenses.length <= 0">
                <app-not-found subject="spesa"></app-not-found>
            </div>
            <div class="pt-1" *ngFor="let expense of expenses | expenseFilter:searchTerm; let i = index">
                <div class="list list-row card col-lg-12">
                    <div class="expense-header row-header" (click)="togglePanel(i)">
                        <span class="flex">{{expense.name}}</span>
                        <span class="expense-amount">{{formatToEur(expense.amount)}}</span>
                        <i class="fa ms-2" [ngClass]="openPanel === i ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                    </div>
                    <div class="expense-body" [class.open]="openPanel === i">
                        <div class="h-1x mt-2">
                            {{expense.owner.name}} {{expense.owner.surname}}
                        </div>
                        <div class="h-1x mb-4">
                            {{expenseDateString(expense)}}
                        </div>
                        <div *ngIf="hasBeenModified(expense)" class="text-muted text-sm h-1x font-italic modified-expense">
                            Modificato il {{expense.updated_at | date:'dd/MM/yyyy HH:mm'}}
                        </div>
                        <div class="d-flex justify-content-end mt-2">
                            <button class="btn btn-success me-1" (click)="openNewExpenseDialog(expense, 'Modifica')" [disabled]="expensesList.paid"><i class="fa fa-pen-to-square"></i></button>
                            <button class="btn btn-primary me-1" (click)="openNewExpenseDialog(expense, 'Ripeti')" [disabled]="expensesList.paid"><i class="fa fa-repeat"></i></button>
                            <button class="btn btn-danger" (click)="delete(expense)" [disabled]="expensesList.paid"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
