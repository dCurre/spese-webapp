<br>
<div class="container col-lg-6">
  <div class="lists-container">
    <div class="list list-row card col-lg-12">
      <div class="expense-header row-header" (click)="partecipantiOpen = !partecipantiOpen">
        <a class="font-weight-bold fs-4 text flex">Partecipanti</a>
        <i class="fa" [ngClass]="partecipantiOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
      </div>
      <div class="expense-body" [class.open]="partecipantiOpen">
        <div class="h-1x mt-2" *ngFor="let partecipant of partecipantsList; first as isFirst">
          {{partecipant.name}} {{partecipant.surname}}<i *ngIf="isFirst" class="fa fa-crown ml-2 text-warning"></i>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="container">
  <div id="spese-detail-chart" class="chart">
    <canvas baseChart [data]="pieChartData" [type]="pieChartType" [options]="pieChartOptions"
      [plugins]="pieChartPlugins">
    </canvas>
  </div>
</div>
<div class="bg-white">
  <table class="table table-condensed table-hover">
    <thead>
      <tr>
        <th></th>
        <th>Deve a</th>
        <th>Importo</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let balanceDetail of balanceDetails">
        <td>{{balanceDetail.buyer}}</td>
        <td>{{balanceDetail.receiver}}</td>
        <td class="text-right" [ngClass]="(balanceDetail.toPay > 0) ? 'text-danger' : 'text-success'">{{formatToEur(balanceDetail.toPay)}}</td>
      </tr>
    </tbody>
  </table>
</div>
