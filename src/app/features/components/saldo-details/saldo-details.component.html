<div class="saldo-wrapper">

    <!-- Partecipanti -->
    <div class="saldo-card" *ngIf="showParticipants">
        <div class="saldo-card-header" (click)="partecipantiOpen = !partecipantiOpen">
            <div class="saldo-card-title">
                <i class="fa fa-users"></i>
                Partecipanti
            </div>
            <i class="fa" [ngClass]="partecipantiOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
        </div>
        <div class="saldo-card-body" [class.open]="partecipantiOpen">
            <div class="participant-row" *ngFor="let p of partecipantsList">
                <div class="participant-avatar" [class.guest-avatar]="p.is_guest">
                    <i *ngIf="p.is_guest" class="fa fa-user"></i>
                    <ng-container *ngIf="!p.is_guest">{{p.name[0].toUpperCase()}}</ng-container>
                </div>
                <span class="participant-name">{{p.name}} {{p.surname ?? ''}}</span>
                <app-badge variant="owner" *ngIf="p.user_id === ownerUserId"></app-badge>
                <app-badge variant="guest" *ngIf="p.is_guest"></app-badge>
                <button class="participant-remove-btn" *ngIf="p.is_guest" (click)="removeGuest.emit(p.user_id)" title="Rimuovi ospite">
                    <i class="fa fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Grafico -->
    <div class="saldo-card">
        <div class="saldo-card-header" (click)="chartOpen = !chartOpen">
            <div class="saldo-card-title">
                <i class="fa fa-chart-pie"></i>
                {{groupBy === 'type' ? 'Spese per tipologia' : 'Spese per persona'}}
            </div>
            <i class="fa" [ngClass]="chartOpen ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
        </div>
        <div class="saldo-chart-body" [class.open]="chartOpen">
            <div *ngIf="dataLoaded && mapPagato.size === 0" class="chart-empty">
                <i class="fa fa-receipt"></i>
                Nessuna spesa registrata
            </div>
            <ng-container *ngIf="mapPagato.size > 0">
                <canvas baseChart [data]="pieChartData" [type]="pieChartType"
                    [options]="pieChartOptions" [plugins]="pieChartPlugins">
                </canvas>
                <div class="chart-legend">
                    <div class="chart-legend-item" *ngFor="let label of pieChartData.labels; let i = index">
                        <span class="chart-legend-dot" [style.background]="chartColors[i]"></span>
                        <span class="chart-legend-name">{{label}}</span>
                        <span class="chart-legend-value">{{formatToEur(pieChartData.datasets[0].data[i])}}</span>
                    </div>
                </div>
            </ng-container>
        </div>
    </div>

</div>
