<div class="signin-page" [class.leaving-left]="leaving">

    <div class="signin-left">
        <div class="signin-brand">
            <i class="fa fa-money-bill-wave signin-brand-icon"></i>
            <span class="signin-brand-name">Spese</span>
        </div>
        <h1 class="signin-tagline">Tieni traccia delle spese condivise,<br>senza stress.</h1>
        <p class="signin-sub">Crea liste, aggiungi spese e scopri chi deve cosa a chi — in pochi tap.</p>
    </div>

    <div class="signin-right">
        <div class="signin-card">
            <h2 class="signin-title">Bentornato</h2>
            <p class="signin-desc">Accedi al tuo account</p>

            <button class="btn-google-signin" (click)="authService.GoogleAuth()">
                <img src="https://img.icons8.com/color/20/000000/google-logo.png" alt="Google">
                Continua con Google
            </button>

            <div class="signin-divider">
                <span>oppure</span>
            </div>

            <form [formGroup]="loginForm">
                <div class="field-group">
                    <label class="field-label">Email</label>
                    <input type="email" formControlName="email" class="field-input" placeholder="nome@email.com">
                </div>
                <div class="field-group">
                    <label class="field-label">Password</label>
                    <input type="password" formControlName="password" class="field-input" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-signin" [disabled]="loginForm.invalid">Accedi</button>
            </form>

            <p class="signin-footer">
                Non hai un account? <a (click)="goToSignup()" style="cursor:pointer">Registrati</a>
            </p>
        </div>
    </div>

</div>
